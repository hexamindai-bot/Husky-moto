<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>მონაწილეები</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+Georgian:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --orange: #ff4d00;
    --dark: #0c0c0e;
    --card: #161618;
    --border: #2a2a2e;
    --text: #f0ede8;
    --muted: #888;
  }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Noto Sans Georgian', sans-serif;
    min-height: 100vh;
  }

  .nav {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 16px;
    background: rgba(12,12,14,0.95);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 10;
  }
  .nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 2px; color: var(--orange); }
  .nav-dot { width: 4px; height: 4px; background: var(--border); border-radius: 50%; }
  .nav-sub { font-size: 12px; color: var(--muted); }

  .header {
    padding: 24px 16px 12px;
  }
  .header-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 1px;
    color: var(--text);
  }
  .header-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }

  .filter-row {
    display: flex;
    gap: 8px;
    padding: 0 16px 16px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 6px 14px;
    font-family: 'Noto Sans Georgian', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.15s;
  }
  .filter-btn.active {
    background: var(--orange);
    border-color: var(--orange);
    color: #fff;
  }

  .racers-grid {
    padding: 0 16px 40px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .racer-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  .racer-photo {
    width: 64px;
    height: 64px;
    border-radius: 12px;
    object-fit: cover;
    background: var(--dark);
    flex-shrink: 0;
    border: 1px solid var(--border);
  }
  .racer-avatar {
    width: 64px;
    height: 64px;
    border-radius: 12px;
    background: linear-gradient(135deg, #1a1a1e, #2a2a2e);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }

  .racer-info {
    flex: 1;
    min-width: 0;
  }
  .racer-name {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .racer-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 6px;
  }
  .racer-tag {
    font-size: 11px;
    color: var(--muted);
    background: var(--dark);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 8px;
  }
  .racer-tag.orange {
    color: var(--orange);
    border-color: rgba(255,77,0,0.3);
    background: rgba(255,77,0,0.08);
  }

  .license-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
  }
  .license-valid {
    background: rgba(0,200,100,0.1);
    color: #00c864;
    border: 1px solid rgba(0,200,100,0.2);
  }
  .license-invalid {
    background: rgba(255,77,0,0.1);
    color: var(--orange);
    border: 1px solid rgba(255,77,0,0.2);
  }

  .racer-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--border);
    flex-shrink: 0;
    min-width: 36px;
    text-align: right;
  }

  .loading {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 60vh; gap: 16px;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--orange);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: var(--muted); font-size: 14px; }

  .empty {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 50vh; gap: 12px;
    text-align: center; padding: 24px;
  }
  .empty-icon { font-size: 48px; }
  .empty-text { color: var(--muted); font-size: 14px; }

  .count-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,77,0,0.15);
    color: var(--orange);
    border-radius: 99px;
    padding: 2px 10px;
    font-size: 12px;
    font-weight: 700;
    margin-left: 8px;
  }
</style>
</head>
<body>

<nav class="nav">
  <span class="nav-logo">GNMF</span>
  <span class="nav-dot"></span>
  <span class="nav-sub">საქართველოს მოტოსპორტის ფედერაცია</span>
</nav>

<div class="header">
  <div class="header-title">🏍 მონაწილეები <span class="count-badge" id="countBadge">0</span></div>
  <div class="header-sub">რეგისტრირებული მოტოსპორტსმენები</div>
</div>

<div class="filter-row" id="filterRow">
  <div class="filter-btn active" data-discipline="all">ყველა</div>
</div>

<div id="app">
  <div class="loading">
    <div class="spinner"></div>
    <div class="loading-text">იტვირთება...</div>
  </div>
</div>

<script>
const API_KEY = 'patVk69zPt30vU8wY.5156e44c17a19a2f7582d2831bee7b2f22dd7dab7e66c41c50179c9b91b4dcc2';
const BASE_ID = 'app6CrexxFMlZl8Vz';
const TABLE = 'racers';

let allRacers = [];
let activeFilter = 'all';

async function load() {
  try {
    const res = await fetch(
      `https://api.airtable.com/v0/${BASE_ID}/${TABLE}?filterByFormula={public_profile_status}="published"&maxRecords=50`,
      { headers: { Authorization: `Bearer ${API_KEY}` } }
    );
    const data = await res.json();
    allRacers = data.records.map(r => r.fields);
    buildFilters();
    render(allRacers);
    document.getElementById('countBadge').textContent = allRacers.length;
  } catch(e) {
    document.getElementById('app').innerHTML = `
      <div class="empty">
        <div class="empty-icon">🏍</div>
        <div style="font-size:16px;font-weight:700">ვერ ჩაიტვირთა</div>
        <div class="empty-text">გთხოვთ სცადოთ მოგვიანებით</div>
      </div>`;
  }
}

function buildFilters() {
  const disciplines = [...new Set(allRacers.map(r => r.discipline).filter(Boolean))];
  const filterRow = document.getElementById('filterRow');
  disciplines.forEach(d => {
    const btn = document.createElement('div');
    btn.className = 'filter-btn';
    btn.dataset.discipline = d;
    btn.textContent = d;
    filterRow.appendChild(btn);
  });

  filterRow.addEventListener('click', function(e) {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    filterRow.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.discipline;
    const filtered = activeFilter === 'all' ? allRacers : allRacers.filter(r => r.discipline === activeFilter);
    render(filtered);
    document.getElementById('countBadge').textContent = filtered.length;
  });
}

function render(racers) {
  const app = document.getElementById('app');

  if (!racers.length) {
    app.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🏍</div>
        <div style="font-size:16px;font-weight:700">მონაწილეები არ მოიძებნა</div>
        <div class="empty-text">სხვა კატეგორია სცადეთ</div>
      </div>`;
    return;
  }

  app.innerHTML = `<div class="racers-grid">${racers.map((r, i) => racerCard(r, i+1)).join('')}</div>`;
}

function racerCard(r, num) {
  const photo = r.photo && r.photo[0] ? r.photo[0].url : null;
  const name = r.full_name || r.racer_id || 'უცნობი';
  const discipline = r.discipline || '';
  const team = r.team || '';
  const country = r.country || '';
  const city = r.city || '';
  const licenseStatus = r.license_status || '';
  const licenseNum = r.license_number || '';

  const photoEl = photo
    ? `<img class="racer-photo" src="${photo}" alt="${name}">`
    : `<div class="racer-avatar">🏍</div>`;

  const licenseEl = licenseStatus
    ? `<span class="license-badge ${licenseStatus === 'valid' ? 'license-valid' : 'license-invalid'}">
        ${licenseStatus === 'valid' ? '✓' : '✗'} ${licenseStatus}
       </span>`
    : '';

  return `
    <div class="racer-card">
      ${photoEl}
      <div class="racer-info">
        <div class="racer-name">${name}</div>
        <div class="racer-meta">
          ${discipline ? `<span class="racer-tag orange">${discipline}</span>` : ''}
          ${team ? `<span class="racer-tag">${team}</span>` : ''}
          ${country ? `<span class="racer-tag">🌍 ${country}${city ? ', ' + city : ''}</span>` : ''}
        </div>
        ${licenseEl}
        ${licenseNum ? `<div style="font-size:11px;color:var(--muted);margin-top:4px">#${licenseNum}</div>` : ''}
      </div>
      <div class="racer-number">${String(num).padStart(2,'0')}</div>
    </div>`;
}

load();
</script>
</body>
</html>
