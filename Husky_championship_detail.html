<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ჩემპიონატი</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+Georgian:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --orange: #ff4d00;
    --dark: #0c0c0e;
    --card: #161618;
    --border: #2a2a2e;
    --text: #f0ede8;
    --muted: #888;
  }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Noto Sans Georgian', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HERO */
  .hero {
    position: relative;
    height: 55vw;
    max-height: 320px;
    min-height: 200px;
    overflow: hidden;
    background: #111;
  }
  .hero img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .hero-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, rgba(12,12,14,0) 30%, rgba(12,12,14,1) 100%);
  }
  .hero-badge {
    position: absolute;
    top: 16px; left: 16px;
    background: var(--orange);
    color: #fff;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 2px;
    padding: 4px 12px;
    border-radius: 2px;
  }

  /* CONTENT */
  .content {
    padding: 0 16px 40px;
    margin-top: -8px;
    position: relative;
  }

  .title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(32px, 10vw, 52px);
    letter-spacing: 1px;
    line-height: 1;
    margin-bottom: 6px;
    color: var(--text);
  }

  .promoter {
    font-size: 12px;
    color: var(--orange);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  /* INFO GRID */
  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 24px;
  }
  .info-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .info-card.full { grid-column: 1 / -1; }
  .info-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .info-value {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }
  .info-icon {
    font-size: 18px;
    margin-bottom: 4px;
  }

  /* STRIPE ACCENT */
  .stripe {
    width: 40px; height: 3px;
    background: var(--orange);
    border-radius: 2px;
    margin-bottom: 20px;
  }

  /* WEATHER PILL */
  .weather-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,77,0,0.12);
    border: 1px solid rgba(255,77,0,0.25);
    border-radius: 99px;
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 600;
    color: #ff8855;
    margin-bottom: 20px;
  }

  /* SECTION */
  .section-title {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  /* CLASSES */
  .classes-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
  }
  .class-tag {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }

  /* BUTTONS */
  .btn-row {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 8px;
  }
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 16px;
    border-radius: 12px;
    font-family: 'Noto Sans Georgian', sans-serif;
    font-size: 15px;
    font-weight: 700;
    text-decoration: none;
    border: none;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn:active { opacity: 0.8; }
  .btn-primary {
    background: var(--orange);
    color: #fff;
  }
  .btn-secondary {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
  }

  /* DIVIDER */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 20px 0;
  }

  /* DESCRIPTION */
  .description {
    font-size: 14px;
    line-height: 1.7;
    color: #aaa;
    margin-bottom: 24px;
  }

  /* LOADING */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 80vh;
    gap: 16px;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--orange);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: var(--muted); font-size: 14px; }

  /* ERROR */
  .error {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 80vh;
    gap: 12px;
    padding: 24px;
    text-align: center;
  }
  .error-icon { font-size: 48px; }
  .error-text { color: var(--muted); font-size: 14px; }

  /* FADE IN */
  .fade-in {
    animation: fadeIn 0.4s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

  /* NAV BAR */
  .nav {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px;
    background: rgba(12,12,14,0.95);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .nav-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 2px;
    color: var(--orange);
  }
  .nav-dot { width: 4px; height: 4px; background: var(--border); border-radius: 50%; }
  .nav-sub { font-size: 12px; color: var(--muted); }
</style>
</head>
<body>

<nav class="nav">
  <span class="nav-logo">GNMF</span>
  <span class="nav-dot"></span>
  <span class="nav-sub">საქართველოს მოტოსპორტის ფედერაცია</span>
</nav>

<div id="app">
  <div class="loading">
    <div class="spinner"></div>
    <div class="loading-text">იტვირთება...</div>
  </div>
</div>

<script>
const API_KEY = 'patVk69zPt30vU8wY.5156e44c17a19a2f7582d2831bee7b2f22dd7dab7e66c41c50179c9b91b4dcc2';
const BASE_ID = 'app6CrexxFMlZl8Vz';
const TABLE = 'championships';

function getParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

function formatDate(raw) {
  if (!raw) return '—';
  const d = new Date(raw);
  const months = ['იანვარი','თებერვალი','მარტი','აპრილი','მაისი','ივნისი','ივლისი','აგვისტო','სექტემბერი','ოქტომბერი','ნოემბერი','დეკემბერი'];
  return `${d.getDate()} ${months[d.getMonth()]}, ${d.getFullYear()} — ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

async function load() {
  const id = getParam('id');
  if (!id) { showError('ჩემპიონატი ვერ მოიძებნა'); return; }

  try {
    const res = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${TABLE}/${id}`, {
      headers: { Authorization: `Bearer ${API_KEY}` }
    });
    if (!res.ok) throw new Error('not found');
    const { fields } = await res.json();
    render(fields);
  } catch(e) {
    showError('ჩემპიონატი ვერ ჩაიტვირთა');
  }
}

function render(f) {
  const img = f['Image'] && f['Image'][0] ? f['Image'][0].url : '';
  const date = formatDate(f['Date']);
  const venue = f['Venue'] || '—';
  const weather = f['weather'] || '';
  const classes = f['classes'] || f['Discipline classes'] || '';
  const age = f['Age'] || '';
  const regUrl = f['Registration _URL'] || '';
  const mapsUrl = f['Maps_URL'] || '';
  const description = f['Description'] || f['dscription'] || '';
  const promoter = f['Promoter'] || '';
  const regOpen = f['Registration open'];

  document.title = f['Title'] || 'ჩემპიონატი';

  document.getElementById('app').innerHTML = `
    <div class="fade-in">
      <div class="hero">
        ${img ? `<img src="${img}" alt="${f['Title']}">` : '<div style="height:100%;background:linear-gradient(135deg,#1a1a1e,#0c0c0e)"></div>'}
        <div class="hero-overlay"></div>
        <div class="hero-badge">🏁 ჩემპიონატი</div>
      </div>

      <div class="content">
        <div class="title">${f['Title'] || ''}</div>
        ${promoter ? `<div class="promoter">${promoter}</div>` : '<div style="margin-bottom:24px"></div>'}

        ${weather ? `<div class="weather-pill">🌤 ${weather}</div>` : ''}

        <div class="info-grid">
          <div class="info-card full">
            <div class="info-icon">📅</div>
            <div class="info-label">თარიღი და დრო</div>
            <div class="info-value">${date}</div>
          </div>
          <div class="info-card full">
            <div class="info-icon">📍</div>
            <div class="info-label">ადგილი</div>
            <div class="info-value">${venue}</div>
          </div>
          ${age ? `
          <div class="info-card">
            <div class="info-icon">🔞</div>
            <div class="info-label">ასაკი</div>
            <div class="info-value">${age}</div>
          </div>` : ''}
          ${classes ? `
          <div class="info-card">
            <div class="info-icon">🏍</div>
            <div class="info-label">კლასი</div>
            <div class="info-value">${classes}</div>
          </div>` : ''}
        </div>

        ${description ? `
        <div class="section-title">აღწერა</div>
        <div class="description">${description}</div>
        ` : ''}

        <div class="divider"></div>

        <div class="btn-row">
          ${regOpen && regUrl ? `<a href="${regUrl}" class="btn btn-primary" target="_blank">📝 რეგისტრაცია</a>` : `<div class="btn btn-secondary" style="opacity:0.5;cursor:default">რეგისტრაცია დახურულია</div>`}
          ${mapsUrl ? `<a href="${mapsUrl}" class="btn btn-secondary" target="_blank">🗺 მარშრუტი</a>` : ''}
        </div>
      </div>
    </div>
  `;
}

function showError(msg) {
  document.getElementById('app').innerHTML = `
    <div class="error">
      <div class="error-icon">🏍</div>
      <div style="font-size:18px;font-weight:700">${msg}</div>
      <div class="error-text">გთხოვთ სცადოთ მოგვიანებით</div>
    </div>
  `;
}

load();
</script>
</body>
</html>
